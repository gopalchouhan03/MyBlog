name: Deploy Frontend to AWS S3 & CloudFront

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: 18

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Verify build
        run: |
          if [ ! -d "frontend/dist" ] || [ -z "$(ls -A frontend/dist)" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ Build verified"

      - name: Deploy to S3
        run: |
          echo "📤 Uploading to S3..."
          aws s3 sync frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude "index.html"
          
          aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
          
          echo "✅ S3 upload complete"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          echo "🔄 Invalidating CloudFront..."
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id $INVALIDATION_ID
          
          echo "✅ CloudFront cache invalidated"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Deployment summary
        if: success()
        run: |
          echo "🎉 Frontend deployment successful!"
          echo "================================"
          echo "🌍 Frontend: https://d3hpld8vt7tywq.cloudfront.net"
          echo "🔗 Backend API: https://d2w8d5sgt2ne9t.cloudfront.net/api"
          echo "================================"